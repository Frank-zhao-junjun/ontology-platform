# H2 快速验证配置
spring:
  datasource:
    url: jdbc:h2:mem:ontology;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

ontology:
  api:
    auth:
      enabled: false
  h2:
    console:
      enabled: true
