# =============================================
# 开发环境配置 (profile: dev)
# =============================================
# 栈：PostgreSQL + Flyway + MyBatis-Plus（与生产一致，不用 Hibernate 建表）
# 前置：本地 PostgreSQL。
#   cd docker && docker compose up -d postgres

server:
  port: 8081

spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false

logging:
  level:
    com.ontology.platform: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
