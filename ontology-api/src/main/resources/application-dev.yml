# =============================================
# 开发环境配置 (profile: dev)
# =============================================
# 栈：PostgreSQL + Flyway + MyBatis-Plus（与生产一致，不用 Hibernate 建表）
# 前置：本地 PostgreSQL；Phase 2 异步任务 / 限流 / Webhook 还需 Redis
#   cd docker && docker compose up -d postgres redis
#
# Flyway 脚本含 PG 专有语法（uuid-ossp、JSONB 等），H2 无法替代。

server:
  port: ${DEPLOY_RUN_PORT:-8080}

spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true

management:
  health:
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:true}

logging:
  level:
    com.ontology.platform: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
