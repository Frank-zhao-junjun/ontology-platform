# =============================================
# 本体建模平台 - 开发环境配置 (H2内存数据库)
# =============================================

server:
  port: ${DEPLOY_RUN_PORT:-8080}
  servlet:
    context-path: /api

spring:
  # 数据源配置 - H2内存数据库
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ontology;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20

  # H2控制台配置
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  # 禁用Flyway（使用H2自动建表）
  flyway:
    enabled: false

  # Redis配置 - 使用嵌入式或禁用
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# 日志配置
logging:
  level:
    com.ontology.platform: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
