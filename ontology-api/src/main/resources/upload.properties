# 上传配置文件

# 文件存储路径
upload.storage.base-path=/data/uploads
upload.storage.temp-dir=temp
upload.storage.completed-dir=completed
upload.storage.processed-dir=processed

# 文件大小限制
upload.max-file-size=104857600  # 100MB
upload.chunk-size=5242880       # 5MB

# 文件类型
upload.allowed-types=csv,xlsx,xls,json

# 导入配置
import.batch-size=1000
import.max-errors=1000
import.timeout-hours=24

# 导出配置
export.batch-size=1000
export.max-rows=1000000
