# 制造域 OntologyManifest 样例（生产制造限界上下文）
# 用于设计台导出 ↔ 平台导入 round-trip 验收
# 规范：../ontology-manifest-spec.md

apiVersion: ontology.platform/v1
kind: OntologyManifest

metadata:
  id: manufacturing-ontology
  version: 0.1.0
  name: 生产制造本体
  displayName: 生产制造本体
  description: MVP 制造域参考模型（生产订单 / 物料 / BOM / 工艺路线）
  boundedContext: 生产制造
  domainTags:
    - 生产制造
  compiledAt: "2026-06-04T00:00:00.000Z"
  source: ontology-designer
  status: draft

spec:
  semantic:
    boundedContext:
      id: bc-manufacturing
      name: 生产制造
      nameEn: Manufacturing
      description: 生产执行与工单生命周期

    businessScenarios:
      - id: scenario-mts
        name: 面向库存生产
        nameEn: MTS
        description: 按库存补货驱动生产
        applicableObjectTypeIds:
          - production-order
      - id: scenario-mto
        name: 面向订单生产
        nameEn: MTO
        description: 严格按销售订单驱动
        applicableObjectTypeIds:
          - production-order

    valueObjects:
      - id: vo-quantity
        name: 数量
        nameEn: Quantity
        properties:
          - id: vo-q-amount
            name: 数值
            nameEn: amount
            dataType: decimal
            required: true
          - id: vo-q-unit
            name: 单位
            nameEn: unit
            dataType: string
            required: true

    objectTypes:
      - id: production-order
        name: 生产订单
        nameEn: ProductionOrder
        kind: aggregate_root
        businessScenarioIds:
          - scenario-mts
          - scenario-mto
        description: 核心生产执行单据
        properties:
          - id: attr-order-id
            name: 生产订单号
            nameEn: order_id
            dataType: string
            required: true
          - id: attr-order-type
            name: 订单类型
            nameEn: order_type
            dataType: enum
            enumValues: [MTS, MTO]
            required: true
          - id: attr-status
            name: 订单状态
            nameEn: status
            dataType: enum
            enumValues: [CREATED, RELEASED, IN_PROGRESS, REPORTED, PRODUCED, TECH_CLOSED]
            required: true
          - id: attr-planned-qty
            name: 计划数量
            nameEn: planned_qty
            dataType: reference
            valueObjectRef: vo-quantity
            required: true
          - id: attr-cost-price
            name: 成本价
            nameEn: cost_price
            dataType: decimal
            sensitive: true
        relations:
          - id: rel-po-bom
            name: 引用BOM
            sourceObjectTypeId: production-order
            targetObjectTypeId: bom
            cardinality: "N:1"
            relationKind: reference

      - id: operation
        name: 工序
        nameEn: Operation
        kind: entity
        aggregateRootId: production-order
        properties:
          - id: attr-op-number
            name: 工序号
            nameEn: op_number
            dataType: integer
            required: true

      - id: material
        name: 物料
        nameEn: Material
        kind: aggregate_root
        properties:
          - id: attr-material-code
            name: 物料编码
            nameEn: material_code
            dataType: string
            required: true

      - id: bom
        name: BOM
        nameEn: BillOfMaterial
        kind: aggregate_root

      - id: routing
        name: 工艺路线
        nameEn: Routing
        kind: aggregate_root

    stateMachines:
      - id: sm-production-order
        name: 生产订单生命周期
        objectTypeId: production-order
        statusField: status
        states:
          - { name: 创建, code: CREATED, isInitial: true }
          - { name: 已下达, code: RELEASED }
          - { name: 执行中, code: IN_PROGRESS }
          - { name: 已报工, code: REPORTED }
          - { name: 已产出, code: PRODUCED }
          - { name: 技术关闭, code: TECH_CLOSED, isFinal: true }
        transitions:
          - { name: 下达, from: CREATED, to: RELEASED, trigger: manual, actionId: action-release-order }

  behavior:
    actions:
      - id: action-create-order
        name: 创建生产订单
        nameEn: CreateProductionOrder
        aggregateRootId: production-order
        parameters:
          - { name: 物料编码, nameEn: material_code, dataType: string, required: true }
        publishesEventIds:
          - evt-order-created

      - id: action-release-order
        name: 生产订单下达
        nameEn: ReleaseProductionOrder
        aggregateRootId: production-order
        businessScenarioIds:
          - scenario-mts
          - scenario-mto
        parameters:
          - { name: 生产订单号, nameEn: order_id, dataType: string, required: true }
        preRuleIds:
          - rule-kitting
          - rule-routing-valid
        allowedStateFrom: [CREATED]
        publishesEventIds:
          - evt-order-released
        mcpToolName: execute_production_order_release

      - id: action-reserve-material
        name: 物料预留
        nameEn: ReserveMaterial
        aggregateRootId: material
        description: 事件处理器示例：响应订单已下达

    rules:
      - id: rule-kitting
        name: 物料齐套校验
        type: precondition
        expression:
          type: cross_entity
          description: BOM 中所有物料库存余量 ≥ 工单需求量
        errorMessage: 物料未齐套，无法下达工单
        failurePayloadSchema:
          type: object
          properties:
            failedItems:
              type: array
              items:
                properties:
                  materialCode: { type: string }
                  shortage: { type: number }

      - id: rule-routing-valid
        name: 工艺路线校验
        type: precondition
        expression:
          type: expression
          description: 成品必须有且仅有一条有效工艺路线，工序无环
        errorMessage: 工艺路线无效

    metrics:
      - id: metric-otd
        name: 准时完工率
        formula: on_time_completed / total_completed * 100
        dataSourceRef: evt-order-tech-closed
        period: month

    transactionBoundaries:
      - id: tx-release-order
        actionId: action-release-order
        description: 更新状态、预留物料、生成工序任务须原子完成
        operations:
          - { type: update_state, field: status, value: RELEASED }
          - { type: reserve_material }
          - { type: create_operations }

  events:
    domainEvents:
      - id: evt-order-created
        name: 生产订单已创建
        nameEn: ProductionOrderCreated
        aggregateRootId: production-order
        triggerActionId: action-create-order
        payloadSchema:
          required: [event_id, timestamp, order_id, status]

      - id: evt-order-released
        name: 生产订单已下达
        nameEn: ProductionOrderReleased
        aggregateRootId: production-order
        triggerActionId: action-release-order
        payloadSchema:
          required: [event_id, timestamp, order_id, order_status]

      - id: evt-order-tech-closed
        name: 生产订单技术关闭
        nameEn: ProductionOrderTechnicallyClosed
        aggregateRootId: production-order

    routes:
      - id: route-order-released
        eventId: evt-order-released
        targets:
          - { boundedContext: 物料管理, system: WMS }

    handlers:
      - id: handler-reserve-material
        routeId: route-order-released
        targetBoundedContext: 物料管理
        actionId: action-reserve-material
        businessScenarioIds: [scenario-mts]

  governance:
    roles:
      - id: role-planner
        name: 生产计划员
        permissions:
          - objectTypeId: production-order
            ops: [READ, EXECUTE]
            denyActionIds: []

      - id: role-cost-accountant
        name: 成本会计
        permissions:
          - objectTypeId: production-order
            ops: [READ]

    fieldPermissions:
      - objectTypeId: production-order
        propertyNameEn: cost_price
        allowedRoleIds: [role-cost-accountant]

    agentPolicies:
      - id: sandbox-prod-planner
        manifestVersion: "0.1.0"
        roleId: role-planner
        allowedMcpTools:
          - resolve_intent
          - query_ontology
          - execute_action
        allowedAggregateRootIds:
          - production-order
        allowedActionIds:
          - action-create-order
          - action-release-order
        rateLimit:
          maxCallsPerSecond: 10
        defaultDeny: true

  dataSources:
    - id: ds-sap-po
      name: SAP 生产订单 OData
      type: api
      boundObjectTypeId: production-order
      api:
        baseUrl: https://sap.example/odata/s4
        entitySet: ProductionOrders
        authSecretRef: secret/sap-oauth-prod
