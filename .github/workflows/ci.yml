# =============================================
# 本体建模平台 — CI/CD Pipeline
# =============================================
# 技术栈: Java 21 + Spring Boot 3.2 + Maven
# 分支: main (push / PR)
# =============================================

name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn compile -B -q

      - name: Run tests
        run: mvn test -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "header": { "title": { "tag": "plain_text", "content": "❌ CI Failed" }, "template": "red" },
                "elements": [
                  { "tag": "markdown", "content": "**仓库:** ontology-platform\n**分支:** ${{ github.ref_name }}\n**提交:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n**运行:** [查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" }
                ]
              }
            }'

      - name: Notify on success
        if: success()
        run: |
          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "header": { "title": { "tag": "plain_text", "content": "✅ CI Passed" }, "template": "green" },
                "elements": [
                  { "tag": "markdown", "content": "**仓库:** ontology-platform\n**分支:** ${{ github.ref_name }}\n**提交:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n**运行:** [查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" }
                ]
              }
            }'
