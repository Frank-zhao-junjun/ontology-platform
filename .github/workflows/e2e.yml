# =============================================
# 本体模型服务平台 — E2E 集成测试流水线
# =============================================
# 技术栈: Java 21 + Spring Boot 3.2 + Maven + Apache AGE (Testcontainers)
# 触发: main / release/** 分支 push；main 分支 PR；手动触发
# =============================================

name: E2E

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Docker E2E Verification
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Run E2E / IT tests
        run: mvn verify -Pintegration-test -B

      - name: Upload failsafe reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failsafe-reports
          path: '**/target/failsafe-reports/'
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "header": { "title": { "tag": "plain_text", "content": "❌ E2E Failed" }, "template": "red" },
                "elements": [
                  { "tag": "markdown", "content": "**仓库:** ontology-platform\n**分支:** ${{ github.ref_name }}\n**提交:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n**运行:** [查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" }
                ]
              }
            }'

      - name: Notify on success
        if: success()
        run: |
          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "header": { "title": { "tag": "plain_text", "content": "✅ E2E Passed" }, "template": "green" },
                "elements": [
                  { "tag": "markdown", "content": "**仓库:** ontology-platform\n**分支:** ${{ github.ref_name }}\n**提交:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n**运行:** [查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" }
                ]
              }
            }'
