# =============================================
# 本体建模平台 - 开发环境 Docker Compose
# =============================================

version: '3.8'

services:
  # =============================================
  # PostgreSQL + Apache AGE
  # =============================================
  postgres:
    image: apache/age:${AGE_VERSION:-1.5.0}
    container_name: ontology-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-ontology}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ontology123}
      POSTGRES_DB: ${DB_NAME:-ontology}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ontology}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ontology-network

  # =============================================
  # Redis
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: ontology-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ontology-network

  # =============================================
  # 本体建模平台应用
  # =============================================
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ontology-platform
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES:-dev}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ontology}
      DB_USERNAME: ${DB_USERNAME:-ontology}
      DB_PASSWORD: ${DB_PASSWORD:-ontology123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ontology-network

# =============================================
# 数据卷
# =============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =============================================
# 网络
# =============================================
networks:
  ontology-network:
    driver: bridge
